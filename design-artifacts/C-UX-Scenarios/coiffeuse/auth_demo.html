<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pop Salon — Connexion</title>
  <style>
    :root{--bg:#fafafa;--card:#fff;--accent:#2d88ff;--muted:#666}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;background:var(--bg);color:#111}
    .container{max-width:420px;margin:32px auto;padding:20px}
    .card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 6px 18px rgba(15,15,15,0.06)}
    .logo{display:flex;align-items:center;gap:12px}
    .logo .mark{width:48px;height:48px;border-radius:8px;background:linear-gradient(135deg,#ff7a7a,#ffb36a)}
    h1{margin:12px 0 18px;font-size:20px}
    label{display:block;font-size:13px;color:var(--muted);margin-top:8px}
    input[type=text],input[type=password]{width:100%;padding:12px 14px;border:1px solid #e6e6e6;border-radius:8px;margin-top:6px;font-size:16px}
    .actions{display:flex;gap:8px;margin-top:16px}
    .btn{flex:1;padding:12px;border-radius:10px;border:0;font-weight:600;font-size:15px;cursor:pointer}
    .btn.primary{background:var(--accent);color:#fff}
    .link{background:transparent;color:var(--accent);border:1px solid transparent}
    .or{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:13px}
    .or:before,.or:after{content:"";flex:1;height:1px;background:#eee}
    .fb{background:#1877f2;color:#fff;border-radius:10px;padding:12px;text-align:center;font-weight:700;display:block;text-decoration:none}
    .footer{margin-top:14px;text-align:center;font-size:14px;color:var(--muted)}
    .small{font-size:13px;color:var(--muted);margin-top:10px}
    a{text-decoration:none;color:var(--accent)}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <div style="font-weight:700">Pop Salon</div>
          <div class="small">Gestion propriétaire</div>
        </div>
      </div>
      <h1>Connexion</h1>

      <form id="loginForm" onsubmit="event.preventDefault(); alert('Simuler connexion');">
        <label for="email">Email</label>
        <input id="email" type="text" placeholder="ex: rachel@pop.com" required>

        <label for="password">Mot de passe</label>
        <input id="password" type="password" placeholder="••••••••" required>

        <div class="actions">
          <button class="btn primary" type="submit">Se connecter</button>
          <button class="btn link" type="button" onclick="alert('Réinitialisation mot de passe');">Mot de passe oublié</button>
        </div>

        <div class="or">ou</div>

        <a class="fb" href="#" onclick="event.preventDefault(); alert('Lancer OAuth Facebook (démo)');">Se connecter avec Facebook</a>

        <div class="footer">Pas encore de compte ? <a href="#" onclick="event.preventDefault(); alert('Aller à l\'inscription (démo)');">S'inscrire</a></div>
      </form>
    </div>

    <div style="text-align:center;margin-top:14px;color:var(--muted);font-size:13px">En ouvrant la connexion Facebook, la fenêtre d'autorisation s'ouvrira et demandera les permissions nécessaires.</div>
  </div>

</body>
</html>
